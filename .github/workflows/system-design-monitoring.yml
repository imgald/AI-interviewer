name: system-design-monitoring

on:
  workflow_dispatch:
  schedule:
    - cron: "0 13 * * *"
    - cron: "15 13 * * 1"

jobs:
  monitoring:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check monitoring alerts
        run: npm run check:system-design-alerts

      - name: Build weekly snapshot and drift report
        run: npm run eval:system-design:weekly

      - name: Upload weekly metrics artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: system-design-weekly-metrics
          path: docs/metrics/system-design-weekly
